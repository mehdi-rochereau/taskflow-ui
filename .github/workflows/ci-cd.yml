# ============================================================
# CI/CD Pipeline — TaskFlow UI
#
# CI — triggered on every push, pull request and manually
#      via workflow_dispatch (CI only by default)
# CD — triggered on push to main only, or manually with
#      force_deploy enabled
#
# Jobs:
#   ci → gitleaks, install, prettier, lint, build, npm audit
#   cd → docker build, trivy scan, push ghcr.io, deploy VPS,
#        health check, rollback, smoke tests
#
# Security model:
#   - GITHUB_TOKEN used for all registry operations (no PAT)
#   - Permissions declared at workflow level (least privilege)
#   - Secrets: VPS_HOST, VPS_USER, VPS_SSH_KEY
#
# Performance:
#   - npm dependencies cached across runs
#   - Angular production build artifact reused in CD (no rebuild)
#   - Docker layers cached via GitHub Actions cache (buildx)
#
# Reliability:
#   - Concurrency control cancels outdated runs on same branch
#   - Timeout limits prevent runaway jobs consuming CI minutes
#   - Automatic rollback to previous image if health check fails
#   - Health check retries for 2 minutes after deploy
# ============================================================

name: CI/CD

on:
  push:
    # CI runs on every branch push to catch regressions early
    branches: [ "**" ]
  pull_request:
    # CI also runs on PRs — CD is skipped for pull_request events
    branches: [ "**" ]
  workflow_dispatch:
    # Manual trigger — allows forcing a CD deployment from any branch
    # Useful for hotfixes or testing the pipeline without a code change
    inputs:
      force_deploy:
        description: 'Force deployment to VPS (CD)'
        required: false
        default: 'false'
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/mehdi-rochereau/taskflow-ui
  NODE_VERSION: '22'
  # Production UI base URL — used by health check and smoke tests
  UI_BASE_URL: https://taskflow.mehdi-rochereau.dev

# Workflow-level permissions (least privilege principle).
# contents: read   — checkout source code
# packages: write  — push Docker image to ghcr.io
# checks: write    — publish check results (GitLeaks SARIF)
# actions: read    — download artifacts between jobs
permissions:
  contents: read
  packages: write
  checks: write
  actions: read

# Cancel any in-progress run on the same branch when a new push arrives.
# Prevents stale pipeline runs from consuming CI minutes unnecessarily.
# The group key ensures CI and CD share the same concurrency slot per branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── CI ─────────────────────────────────────────────────────
  # Runs on every push and pull request.
  # Validates code formatting, linting, build and security
  # before any artifact is built or deployed.
  ci:
    name: CI
    runs-on: ubuntu-latest
    # Hard limit — prevents a hung npm install or Angular build
    # from consuming the full 6-hour GitHub Actions job limit.
    timeout-minutes: 20

    steps:

      # ── Checkout ─────────────────────────────────────────
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 fetches full git history.
          # Required by GitLeaks to scan all commits, not just HEAD.
          # Without this, GitLeaks only sees the latest commit.
          fetch-depth: 0

      # ── Secret scanning ──────────────────────────────────
      # GitLeaks scans the full commit history for accidentally
      # committed secrets (API keys, passwords, tokens).
      # Runs before any build step to fail fast on security issues.
      - name: Scan for secrets with GitLeaks
        id: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Node.js setup ────────────────────────────────────
      # Node.js 22 LTS — same version as the Dockerfile builder stage.
      # Ensures consistency between CI and Docker build environments.
      # setup-node handles PATH configuration automatically.
      - name: Set up Node.js ${{ env.NODE_VERSION }}
        id: node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # ── npm cache ────────────────────────────────────────
      # Caches the npm module cache between runs.
      # The cache key includes a hash of package-lock.json —
      # if dependencies change, the cache is invalidated automatically.
      # restore-keys provides a fallback to the most recent cache
      # if no exact match is found (partial cache hit).
      # This saves ~1-2 minutes per run when dependencies haven't changed.
      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-

      # ── Install dependencies ──────────────────────────────
      # npm ci installs exact versions from package-lock.json.
      # Faster and more reproducible than npm install.
      # --ignore-scripts prevents malicious postinstall scripts
      # from executing during dependency installation.
      - name: Install dependencies
        id: install
        run: npm ci --ignore-scripts

      # ── Prettier ─────────────────────────────────────────
      # Checks that all TypeScript, HTML and SCSS source files
      # follow the formatting rules defined in .prettierrc:
      # printWidth: 100, singleQuote: true, angular HTML parser.
      # --check mode exits with error if any file is not formatted.
      # Developers should run: npx prettier --write "src/**/*.{ts,html,scss}"
      - name: Check code formatting with Prettier
        id: prettier
        run: npm run format:check

      # ── ESLint ───────────────────────────────────────────
      # Runs Angular ESLint rules defined in eslint.config.js.
      # Installed via: ng add @angular-eslint/schematics
      # Catches TypeScript anti-patterns and Angular-specific issues:
      # - @typescript-eslint/no-explicit-any — avoids losing type safety
      # - @typescript-eslint/no-empty-function — avoids silent error swallowing
      # - Angular template rules — component selectors, lifecycle hooks
      - name: Run ESLint
        id: lint
        run: npm run lint

      # ── Build ────────────────────────────────────────────
      # Compiles the Angular application for production.
      # --configuration production enables:
      #   - Tree shaking — removes unused code (dead code elimination)
      #   - AOT compilation — Ahead-of-Time, catches template errors at build time
      #   - Minification and bundling — reduces bundle size
      #   - Output hashing — cache busting (main.abc123.js)
      #   - Source map generation — for production debugging if needed
      # Output goes to dist/taskflow-ui/browser/ (Angular 17+ browser output dir).
      # The build artifact is uploaded and reused by the CD job —
      # avoiding a second npm install + build in the Docker phase.
      - name: Build Angular app for production
        id: build
        run: npm run build -- --configuration production

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: taskflow-ui-dist
          path: dist/taskflow-ui/browser/
          # 7 days — long enough for manual CD trigger after CI completes
          retention-days: 7

      # ── npm audit ────────────────────────────────────────
      # Scans npm dependencies for known vulnerabilities.
      # --audit-level=moderate fails on moderate and above (CVSS >= 4).
      # continue-on-error: true — audit is informational for now.
      # npm audit fix was run to resolve known issues (see package-lock.json).
      - name: Run npm audit
        id: audit
        run: npm run audit
        continue-on-error: true

      # ── GitHub Actions Step Summary ──────────────────────
      # Generates a markdown summary table visible in the Actions UI.
      # Uses ternary expressions on step outcomes for status icons.
      - name: Generate CI summary
        if: always()
        run: |
          echo "## 🚀 TaskFlow UI — CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 GitLeaks | ${{ steps.gitleaks.outcome == 'success' && '✅ No secrets detected' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 Install | ${{ steps.install.outcome == 'success' && '✅ Success' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🎨 Prettier | ${{ steps.prettier.outcome == 'success' && '✅ Formatted' || '❌ Issues found' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔎 ESLint | ${{ steps.lint.outcome == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏗️ Build | ${{ steps.build.outcome == 'success' && '✅ Success' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔒 npm audit | ${{ steps.audit.outcome == 'success' && '✅ No vulnerabilities' || '⚠️ Check report' }} |" >> $GITHUB_STEP_SUMMARY

  # ── CD ─────────────────────────────────────────────────────
  # Runs only on push to main or manual workflow_dispatch with
  # force_deploy enabled. Never runs on pull requests.
  # Depends on CI passing (needs: ci).
  #
  # Flow: download build → copy to browser-dist → docker build →
  #       trivy scan → push to ghcr.io → deploy VPS →
  #       health check → rollback if needed → smoke tests
  cd:
    name: CD
    runs-on: ubuntu-latest
    needs: ci
    # Hard limit — prevents a stuck SSH session or Docker push
    # from consuming the full job timeout.
    timeout-minutes: 15
    if: |
      github.event_name != 'pull_request' &&
      (
        (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.force_deploy == 'true')
      )

    steps:

      # ── Checkout ─────────────────────────────────────────
      # Required for Docker build context (Dockerfile.cd, nginx.conf).
      # Angular build itself is downloaded from CI artifact below.
      - name: Checkout source code
        uses: actions/checkout@v4

      # ── Download build from CI ────────────────────────────
      # Downloads the Angular production build artifact from CI.
      # Avoids running npm install + ng build again in CD —
      # the exact same build that passed CI checks is packaged.
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: taskflow-ui-dist
          path: dist/taskflow-ui/browser/

      # ── Setup Buildx ─────────────────────────────────────
      # Initializes Docker buildx with the docker-container driver.
      # Required to enable GitHub Actions cache (type=gha) for
      # Docker layer caching. The default docker driver does not
      # support external cache backends.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Docker login ─────────────────────────────────────
      # Authenticates to GitHub Container Registry using GITHUB_TOKEN.
      # No PAT (Personal Access Token) required — GITHUB_TOKEN has
      # packages: write permission declared at the workflow level.
      # The package must have the repository added in "Manage Actions access"
      # under the package settings on GitHub.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Docker metadata ──────────────────────────────────
      # Generates OCI-compliant image tags and labels automatically:
      # - sha-<short-commit>: immutable tag for traceability
      # - latest: mutable tag for docker compose pull on the VPS
      # Labels include source repo, commit SHA, build date.
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      # ── Prepare build for Docker ──────────────────────────
      # Copies the Angular build to the repo root as browser-dist/.
      # Docker buildx sends the build context to the builder daemon,
      # which resolves paths relative to the context root.
      # dist/taskflow-ui/browser/ is not reliably accessible from
      # the buildx daemon context — copying to root solves this.
      # Dockerfile.cd then uses: COPY browser-dist /usr/share/nginx/html
      - name: Prepare build for Docker
        run: cp -r dist/taskflow-ui/browser ./browser-dist

      # ── Docker build & push ──────────────────────────────
      # Builds the runtime Docker image using Dockerfile.cd.
      # Dockerfile.cd is a minimal runtime-only image — it does NOT
      # run npm or compile Angular. It simply copies the pre-built
      # static files into an nginx:alpine image.
      #
      # cache-from/cache-to: reuses Docker layer cache from previous runs
      # via GitHub Actions cache storage. Layers that haven't changed
      # (nginx base, config copy) are not re-downloaded or re-executed.
      #
      # provenance: false disables SLSA provenance attestation.
      # Enabled by default in buildx but causes digest resolution issues
      # with private registries in some Trivy scan configurations.
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          file: Dockerfile.cd
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      # ── Trivy scan ───────────────────────────────────────
      # Scans the pushed Docker image for OS and library vulnerabilities.
      # Scans the image by digest (immutable) rather than tag (mutable)
      # to ensure the exact pushed image is scanned, not a cached version.
      # ignore-unfixed: true skips CVEs with no available fix —
      # reporting them would be noise with no actionable remediation.
      # severity: CRITICAL — blocks deployment on critical CVEs only.
      # No continue-on-error — a CRITICAL CVE stops the deployment.
      - name: Scan Docker image with Trivy
        id: trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'CRITICAL'
          output: trivy-report.txt
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.txt
          retention-days: 7

      - name: Block on CRITICAL CVE
        run: |
          if grep -q "CRITICAL" trivy-report.txt; then
            echo "❌ CRITICAL CVE detected — blocking deployment"
            cat trivy-report.txt
            exit 1
          else
            echo "✅ No CRITICAL CVE detected"
          fi

      # ── Deploy VPS ───────────────────────────────────────
      # Connects to the production VPS via SSH and deploys the new image.
      # Before pulling the new image, the current container's image
      # reference is saved to /tmp/taskflow_ui_rollback.env.
      # This allows the rollback step to restore the previous version
      # if the health check fails after deployment.
      #
      # VPS setup: Ubuntu 24.04 on Hetzner CPX22, Docker + Nginx + SSL.
      # SSH key: dedicated Ed25519 key generated for GitHub Actions only,
      # stored as VPS_SSH_KEY secret, added to authorized_keys on VPS.
      - name: Deploy to VPS
        id: deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/taskflow
            PREVIOUS_IMAGE=$(docker inspect taskflow-ui --format='{{.Config.Image}}' 2>/dev/null || echo "")
            echo "previous_image=$PREVIOUS_IMAGE" > /tmp/taskflow_ui_rollback.env
            docker compose pull taskflow-ui
            docker compose up -d taskflow-ui
            echo "✅ taskflow-ui deployed"

      # ── Health check ─────────────────────────────────────
      # Polls the frontend URL every 10 seconds for up to 2 minutes (12 attempts).
      # Nginx serves the Angular app — HTTP 200 means the container
      # is running and serving static files correctly.
      # 2 minutes is sufficient for Nginx — no JVM startup or DB migration.
      - name: Health check
        id: health
        run: |
          echo "Waiting for UI to start..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ env.UI_BASE_URL }})
            if [ "$STATUS" = "200" ]; then
              echo "✅ UI is healthy (HTTP $STATUS) after attempt $i"
              exit 0
            fi
            echo "Attempt $i/12 — HTTP $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "❌ Timeout after 2 minutes — UI did not respond"
          exit 1

      # ── Rollback on failure ──────────────────────────────
      # Triggered only if the health check step failed (not skipped).
      # Reads the previous image reference saved before deployment
      # and restores it by re-tagging and restarting the container.
      # This ensures the production UI is never left in a broken state
      # after a failed deployment.
      - name: Rollback on health check failure
        if: failure() && steps.health.outcome == 'failure'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/taskflow
            source /tmp/taskflow_ui_rollback.env
            if [ -n "$PREVIOUS_IMAGE" ]; then
              echo "⚠️ Rolling back to $PREVIOUS_IMAGE"
              docker compose stop taskflow-ui
              docker tag $PREVIOUS_IMAGE ghcr.io/mehdi-rochereau/taskflow-ui:latest
              docker compose up -d taskflow-ui
              echo "✅ Rollback complete"
            else
              echo "❌ No previous image found, cannot rollback"
            fi

      # ── Smoke tests ──────────────────────────────────────
      # Verifies that key endpoints respond correctly after deploy.
      # Tests two endpoints:
      # - / : Angular app served by Nginx (follows redirect with -L)
      # - /actuator/health : API still accessible and healthy
      # Both must return HTTP 200 for the smoke test to pass.
      # This confirms Nginx, SSL termination, and the API are all working.
      - name: Smoke test public endpoints
        id: smoke
        run: |
          echo "Testing public endpoints..."

          UI=$(curl -s -L -o /dev/null -w "%{http_code}" ${{ env.UI_BASE_URL }})
          echo "Angular UI: HTTP $UI"

          API=$(curl -s -o /dev/null -w "%{http_code}" https://api.taskflow.mehdi-rochereau.dev/actuator/health)
          echo "API Health: HTTP $API"

          if [ "$UI" = "200" ] && [ "$API" = "200" ]; then
            echo "✅ All smoke tests passed"
          else
            echo "❌ Smoke tests failed"
            exit 1
          fi

      # ── CD Summary ───────────────────────────────────────
      # Generates a deployment summary visible in the Actions UI.
      # Includes image digest for traceability — links a deployment
      # to the exact immutable image that was pushed and deployed.
      - name: Generate CD summary
        if: always()
        run: |
          echo "## 🚢 TaskFlow UI — CD Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🐳 Docker Build & Push | ${{ steps.build.outcome == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔒 Trivy Scan | ${{ steps.trivy.outcome == 'success' && '✅ No critical vulnerabilities' || '❌ Critical CVE detected' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🚀 Deploy to VPS | ${{ steps.deploy.outcome == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ❤️ Health Check | ${{ steps.health.outcome == 'success' && '✅ UI is UP' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Smoke Tests | ${{ steps.smoke.outcome == 'success' && '✅ All passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.IMAGE_NAME }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed at:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
