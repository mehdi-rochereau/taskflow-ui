# ============================================================
# Nginx configuration for TaskFlow UI
# Serves the Angular production build and handles SPA routing
# ============================================================

server {
    listen 80;
    server_name _;

    # Root directory of the Angular production build
    root /usr/share/nginx/html;
    index index.html;

    # Hide Nginx version from response headers
    server_tokens off;

    # ── Compression ──────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        text/javascript
        application/wasm
        image/svg+xml;

    # ── Security headers ─────────────────────────────────────
    # Prevent clickjacking
    add_header X-Frame-Options "DENY" always;

    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Control referrer information sent with requests
    add_header Referrer-Policy "no-referrer" always;

    # Protect against XSS attacks in older browsers
    add_header X-XSS-Protection "1; mode=block" always;

    # Restrict browser features
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Content Security Policy
    # Allows fonts from Google Fonts and inline styles required by Angular Material
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; script-src 'self'; frame-ancestors 'none';" always;

    # ── Angular SPA routing ──────────────────────────────────
    # Redirect all requests to index.html to support client-side routing
    # Falls back to 404 only if index.html itself is missing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── index.html — no cache ────────────────────────────────
    # Always serve the latest version of the entry point
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # ── Static assets — long cache ───────────────────────────
    # Angular adds content hashes to filenames — safe to cache indefinitely
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|wasm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
