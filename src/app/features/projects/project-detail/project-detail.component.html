@if (project()) {
  <div class="project-detail">
    <app-project-header
      [project]="project()!"
      [isSubmitting]="isSubmitting()"
      (createTask)="openCreateTaskDialog()">
    </app-project-header>

    <div class="tasks-section">
      <div class="tasks-header">
        <h2>Tasks</h2>
        <app-task-filters
          [selectedStatus]="selectedStatus()"
          [selectedPriority]="selectedPriority()"
          (statusChange)="onStatusChange($event)"
          (priorityChange)="onPriorityChange($event)">
        </app-task-filters>
      </div>

      <app-task-table
        [tasks]="tasks()"
        [isLoading]="isLoading()"
        (view)="openTaskDetailDialog($event)"
        (edit)="openEditTaskDialog($event.event, $event.task)"
        (delete)="deleteTask($event.event, $event.task)">
      </app-task-table>
    </div>
  </div>
}
