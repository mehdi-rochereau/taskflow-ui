<div class="login-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Sign in</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()">

        <mat-form-field appearance="outline">
          <mat-label>Username or email</mat-label>
          <input matInput formControlName="identifier" />
          @if (form.get('identifier')?.invalid && form.get('identifier')?.touched) {
            <mat-error>This field is required</mat-error>
          }
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Password</mat-label>
          <input matInput type="password" formControlName="password" />
          @if (form.get('password')?.invalid && form.get('password')?.touched) {
            <mat-error>This field is required</mat-error>
          }
        </mat-form-field>

        @if (errorMessage) {
          <p class="error-message">{{ errorMessage }}</p>
        }

        <button mat-raised-button type="submit" [disabled]="isLoading">
          {{ isLoading ? 'Signing in...' : 'Sign in' }}
        </button>

      </form>
    </mat-card-content>

    <mat-card-actions>
      <a routerLink="/register">No account yet? Sign up</a>
    </mat-card-actions>
  </mat-card>
</div>
