<h2 mat-dialog-title>{{ data.title }}</h2>

<mat-dialog-content>
  <p>{{ data.message }}</p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">
    {{ data.cancelLabel ?? 'Cancel' }}
  </button>
  <button mat-raised-button style="color: var(--mat-sys-error)" (click)="onConfirm()">
    {{ data.confirmLabel ?? 'Delete' }}
  </button>
</mat-dialog-actions>
