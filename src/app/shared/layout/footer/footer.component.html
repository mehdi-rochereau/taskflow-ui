<footer class="footer">
  <mat-divider />
  <div class="footer-content">
    <div class="footer-links">
      <span class="footer-label">API Documentation</span>
      <a [href]="swaggerUrl" target="_blank" rel="noopener noreferrer" mat-button>
        <mat-icon>api</mat-icon>
        Swagger
      </a>
      <a [href]="redocUrl" target="_blank" rel="noopener noreferrer" mat-button>
        <mat-icon>description</mat-icon>
        Redoc
      </a>
    </div>

    <div class="footer-center">
      <span>© {{ currentYear }} TaskFlow — Built by Mehdi Rochereau</span>
    </div>

    <div class="footer-links">
      <span class="footer-label">Developer</span>
      <a [href]="githubUrl" target="_blank" rel="noopener noreferrer" mat-button>
        <mat-icon>code</mat-icon>
        GitHub
      </a>
      <a [href]="linkedinUrl" target="_blank" rel="noopener noreferrer" mat-button>
        <mat-icon>work</mat-icon>
        LinkedIn
      </a>
    </div>
  </div>
</footer>
